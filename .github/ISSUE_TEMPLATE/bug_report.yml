name: "🐞 Bug"
description: "버그 리포트를 작성하는 템플릿입니다."
labels: ["bug"]
assignees: []

body:
  - type: textarea
    attributes:
      label: 🐛 버그 설명
      description: |
        어떤 상황에서 어떤 문제가 발생했는지 구체적으로 작성해주세요.
        예: 로그인 시도 시 '서버 오류' 메시지가 뜨며 진행되지 않음
      placeholder: |
        - 로그인 시도 시 앱이 종료됩니다.
        - 화면 이동 시 스피너가 무한 로딩됩니다.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🔁 재현 절차
      description: |
        어떤 흐름으로 접근했을 때 버그가 발생하는지 단계별로 설명해주세요.
      placeholder: |
        1. 앱 실행
        2. 로그인 화면 진입
        3. 로그인 버튼 클릭
        4. 에러 발생
    validations:
      required: true

  - type: textarea
    attributes:
      label: ✅ 기대 동작
      description: 버그가 발생하지 않았을 경우의 정상적인 동작을 작성해주세요.
      placeholder: "예: 정상적으로 홈 화면으로 이동해야 합니다."
    validations:
      required: true

  - type: textarea
    attributes:
      label: 💻 환경 정보
      description: 테스트 시 사용한 기기 및 OS, 앱 버전 등의 정보를 작성해주세요.
      placeholder: |
        - Device: iPhone 13 Pro
        - OS: iOS 17.2
        - App Version: v1.3.2

  - type: textarea
    attributes:
      label: 📷 스크린샷 / 동영상 (선택)
      description: 가능한 경우 스크린샷 또는 동영상을 첨부해주세요. (URL이나 설명도 가능)
      placeholder: 이미지 또는 동영상 링크를 붙여넣거나, 설명을 적어주세요.
