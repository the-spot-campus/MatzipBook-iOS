name: "🛠 Refactor"
description: "코드 리팩터링 작업을 위한 이슈 템플릿입니다."
labels: ["refactor"]
assignees: []

body:
  - type: textarea
    attributes:
      label: ♻️ 리팩터링 대상
      description: |
        리팩터링이 필요한 코드 또는 모듈에 대해 설명해주세요.

        예:
        - `LoginViewModel.swift`에서 비즈니스 로직과 UI 로직이 섞여 있음
        - 테스트가 어려운 구조
      placeholder: |
        예: 
        - UserRepository에서 네트워크 로직과 파싱 로직이 혼재되어 있음
        - ViewModel이 비대해짐
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🎯 개선 방향
      description: |
        어떤 방식으로 리팩터링할 계획인지, 개선 아이디어를 간략히 작성해주세요.
      placeholder: |
        - UseCase 분리
        - Input/Output 인터페이스 재정의
        - 의존성 주입으로 테스트 용이성 개선

  - type: checkboxes
    attributes:
      label: ✅ 체크리스트
      description: 리팩터링 작업 항목을 체크해주세요.
      options:
        - label: 로직 분리
        - label: 중복 제거
        - label: 테스트 코드 작성
