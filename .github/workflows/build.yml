name: Build Test

on:
  pull_request:
    branches:
      - develop

jobs:
  Build:
    runs-on: macos-15

    steps:
      # 저장소의 코드를 체크아웃
      - name: Checkout project
        uses: actions/checkout@v4
        
      - name: Set up Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install dependencies via CocoaPods
        run: pod install
        working-directory: MatzipBook
        
      - name: Start xcode build 🛠
        run: |
          xcodebuild \
            -workspace MatzipBook/MatzipBook.xcworkspace \
            -scheme MatzipBook \
            -sdk iphonesimulator \
            -skipPackagePluginValidation \
            clean build
